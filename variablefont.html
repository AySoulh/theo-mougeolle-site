  :root {
    --c-sky:       #d6ecf5;
    --c-ink:       #000000;
    --c-lime:      #c6ea3a;
    --c-lime-deep: #2a3500;
    --c-dot-fill:  #ffffff;
    --c-dot-stroke:#050505;
    --offwhite:    #e9f1d6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: #111; font-family: "Nohemi", sans-serif; }

  .ui {
    position: fixed; left: 16px; bottom: 16px;
    z-index: 10;
    display: flex; flex-direction: column; align-items: stretch; gap: 14px;
    padding: 18px 18px 16px;
    width: 278px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;

    /* Glass: unifié avec le panneau de flower-particules */
    background: rgba(28, 26, 32, 0.18);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border-radius: 22px;
    border: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);

    color: #ffffff;
    font-family: "Nohemi", -apple-system, sans-serif;
    font-weight: 400;
    letter-spacing: -0.005em;
  }
  @media (max-width: 560px){ .ui{ width: calc(100vw - 32px); } }

  .site-back-link{
    position: fixed; top: 16px; right: 16px; z-index: 20;
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(28,26,32,.18); backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,.22); border-radius: 30px;
    padding: 10px 16px; color: #fff; font-family: "Nohemi", -apple-system, sans-serif;
    font-size: 13px; text-decoration: none;
  }
  .site-back-link:hover{ background: rgba(28,26,32,.32); }

  /* Text input — refined, airy, light typography. Textarea auto-grows
     vertically thanks to a tiny JS resize helper. */
  .ui textarea#wordInput {
    background: rgba(20, 14, 10, 0.14);
    border: 0.5px solid rgba(255, 245, 230, 0.20);
    color: rgba(250, 248, 244, 0.98);
    padding: 12px 16px;
    font: 300 17px "Nohemi", sans-serif;
    letter-spacing: -0.01em;
    line-height: 1.25;
    border-radius: 14px;
    width: 100%;
    min-height: 44px;
    max-height: 220px;
    text-align: center;
    outline: none;
    resize: none;
    overflow-y: auto;
    box-shadow:
      0 1px 0 0 rgba(255, 250, 240, 0.18) inset,
      0 1px 4px -1px rgba(0, 0, 0, 0.12) inset;
    transition: background 0.2s, border-color 0.2s;
    font-family: "Nohemi", sans-serif;
  }
  .ui textarea#wordInput::placeholder { color: rgba(250, 248, 244, 0.35); }
  .ui textarea#wordInput:focus {
    border-color: rgba(255, 245, 230, 0.45);
    background: rgba(20, 14, 10, 0.22);
  }
  /* Nice themed scrollbar if the textarea overflows */
  .ui textarea#wordInput::-webkit-scrollbar { width: 6px; }
  .ui textarea#wordInput::-webkit-scrollbar-thumb {
    background: rgba(255, 245, 230, 0.25); border-radius: 3px;
  }

  /* Swatches — small pill-like wells */
  .ui .swatches {
    display: flex; gap: 6px; justify-content: center;
    padding: 2px 0 14px;
  }
  .ui .swatch {
    position: relative; width: 30px; height: 30px;
    border-radius: 10px;
    border: 0.5px solid rgba(255, 245, 230, 0.28);
    overflow: hidden; cursor: pointer; padding: 0; background: transparent;
    box-shadow:
      0 1px 0 0 rgba(255, 250, 240, 0.35) inset,
      0 -1px 0 0 rgba(0, 0, 0, 0.12) inset,
      0 2px 4px -1px rgba(0, 0, 0, 0.18);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .ui .swatch:hover {
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 0 rgba(255, 250, 240, 0.4) inset,
      0 -1px 0 0 rgba(0, 0, 0, 0.12) inset,
      0 4px 8px -1px rgba(0, 0, 0, 0.25);
  }
  .ui .swatch input[type="color"] {
    position: absolute; inset: -2px;
    width: calc(100% + 4px); height: calc(100% + 4px);
    border: 0; padding: 0; cursor: pointer;
  }
  .ui .swatch-label {
    position: absolute; bottom: -14px; left: 50%;
    transform: translateX(-50%);
    font-size: 8.5px; font-weight: 400;
    letter-spacing: 0.04em;
    opacity: 0.55; pointer-events: none; white-space: nowrap;
  }

  /* Slider rows */
  .speed-row {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
  }
  .speed-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0.58;
    min-width: 62px;
  }
  .speed-value {
    font-size: 11px;
    font-weight: 500;
    color: rgba(250, 248, 244, 0.85);
    min-width: 44px; text-align: right;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }
  .speed-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none; appearance: none;
    height: 3px;
    background: rgba(30, 20, 15, 0.25);
    border-radius: 2px; outline: none;
    box-shadow: 0 1px 1px -0.5px rgba(0, 0, 0, 0.3) inset;
  }
  .speed-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;

<script>
/* =========================================================================
   NATIVE VARIABLE FONT RENDERING
   -----------------------------------------------------------------------
   Chrome / Safari / Firefox all read `font-variation-settings` from the
   canvas element's inline style and honor it when `ctx.font` names the
   family. So the recipe is:

     glyphCanvas.style.fontVariationSettings = `"wght" ${w}`;
     ctx.font = `${emPx}px "Nohemi"`;
     ctx.fillText(letter, x, y);

   This way the browser uses its own variation interpolator (HarfBuzz on
   Chrome, CoreText on Safari) and the weight animates CONTINUOUSLY — no
   snapping between static faces.

   For each frame and each letter we:
     1. Render the letter at current (weight, skew) into glyphCanvas
     2. Read pixels → alpha mask → Moore-neighborhood trace contours
     3. Blit the rendered letter to the main canvas (mask layer + fill)
     4. Place anchor squares on the contours
   ========================================================================= */

const MAX_LETTERS   = 500;
const MAX_SKEW_RAD  = 18 * Math.PI/180;
const LOOP_MS       = 8300;
const DOT_SPACE_REL = 0.16;
const DOT_R_REL     = 0.06 / 3;
const CORNER_DEG    = 55;

const canvas = document.getElementById("mainCanvas");
const ctx    = canvas.getContext("2d", { alpha: true });
const input  = document.getElementById("wordInput");

// Offscreen glyph renderer — its inline style is where we stamp wght.
const glyphCanvas = document.getElementById("glyphCanvas");
const gctx = glyphCanvas.getContext("2d", { willReadFrequently: true });

let WORD = "Artpoint";

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr  = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = Math.round(rect.width  * dpr);
  canvas.height = Math.round(rect.height * dpr);
}
new ResizeObserver(resizeCanvas).observe(canvas);
resizeCanvas();

const rootCS = () => getComputedStyle(document.documentElement);
const cssVar = (n) => rootCS().getPropertyValue(n).trim() || "#000";

/* AE Easy Ease */
function cubicBezierEasing(p1x, p1y, p2x, p2y) {
  const cx = 3*p1x, bx = 3*(p2x-p1x) - cx, ax = 1 - cx - bx;
  const cy = 3*p1y, by = 3*(p2y-p1y) - cy, ay = 1 - cy - by;
  const sampleX = t => ((ax*t + bx)*t + cx)*t;
  const sampleY = t => ((ay*t + by)*t + cy)*t;
  const sampleDx = t => (3*ax*t + 2*bx)*t + cx;
  return function(x) {
    if (x <= 0) return 0; if (x >= 1) return 1;
    let t = x;
    for (let i=0;i<8;i++){
      const fx = sampleX(t) - x, dx = sampleDx(t);
      if (Math.abs(dx) < 1e-6) break;
      const n = t - fx/dx;
      if (Math.abs(n - t) < 1e-6) { t = n; break; }
      t = n;
    }
    return sampleY(Math.max(0, Math.min(1, t)));
  };
}
const easyEase = cubicBezierEasing(0.33, 0, 0.67, 1);
// Very dramatic S-curve for the blur sweep: control points pulled almost
// to the endpoints so the motion stays slow at both ends and snaps fast
// through the middle.
const sharpEase = cubicBezierEasing(0.9, 0, 0.1, 1);

/* Breathe: thin → black → thin */
/* Per-letter breathe schedule.
   The phase is shifted across the word so the first letter starts at
   the lowest weight (thin) while the last letter starts at the highest
   (black). As the loop progresses, each letter runs its own thin→black→thin
   cycle, offset by its position in the word. */
const WEIGHT_KF = [
  [0.00, 100],
  [0.50, 900],
  [1.00, 100],
];
function weightAtPhase(phase) {
  // `phase` is already wrapped into [0,1). Same math as the old currentWeight.
  for (let i=0;i<WEIGHT_KF.length-1;i++){
    const [t0,w0] = WEIGHT_KF[i], [t1,w1] = WEIGHT_KF[i+1];
    if (phase >= t0 && phase <= t1) return w0 + (w1-w0) * easyEase((phase-t0)/(t1-t0));
  }
  return 400;
}
function currentWeight(p, idx, len) {
  // 2× speed: two full breathe cycles per loop.
  const pFast = (p * 2) % 1;
  const offset = len > 1 ? (idx / (len - 1)) * 0.5 : 0;
  let phase = (pFast + offset) % 1;
  if (phase < 0) phase += 1;
  const raw = weightAtPhase(phase);
  // Amplitude: 1 = full 100..900 range, 0 = always 400 (centre axis value).
  // We contract the oscillation toward the centre weight as amp → 0.
  const CENTER = 400;
  return CENTER + (raw - CENTER) * weightAmp;
}

/* The italic wave sweeps across each line. Each line's wave is phase-shifted
   so you see a diagonal ripple descending the block:
   line 0 starts first, line 1 a bit later, line 2 even later, etc.
   `col` is the position IN THE LINE (not the global index), `lineLen` is
   the length of that line. */
function italicFactor(col, lineLen, p, lineIndex, nLines) {
  const LINE_STAGGER = 0.12;   // fraction of loop between adjacent lines
  // Shift this line's perceived phase
  let lineP = (p - lineIndex * LINE_STAGGER) % 1;
  if (lineP < 0) lineP += 1;
  // Same wave math as before but local to the line
  const center = lineLen + 0.5 - lineP * (lineLen + 2);
  const d = col - center;
  const x = d / 1.8;
  if (Math.abs(x) >= 1) return 0;
  return easyEase(0.5*(1 + Math.cos(Math.PI*x)));
}
function fillOpacity(p){
  if (p <= 0.18) return 1;
  if (p < 0.24)  return 1 - easyEase((p-0.18)/0.06);
  if (p < 0.42)  return 0;
  if (p < 0.48)  return easyEase((p-0.42)/0.06);
  if (p <= 0.68) return 1;
  if (p < 0.74)  return 1 - easyEase((p-0.68)/0.06);
  if (p < 0.92)  return 0;
  return easyEase((p-0.92)/0.08);
}
function blobOpacity(p){
  if (p <= 0.18) return 1;
  if (p < 0.24)  return 1;
  if (p < 0.42)  return 1;
  if (p < 0.48)  return 1 - easyEase((p-0.42)/0.06);
  if (p < 0.68)  return 0;
  if (p < 0.74)  return easyEase((p-0.68)/0.06) * 0.55;
  if (p < 0.92)  return 0.55;
  return 0.55 + (1-0.55) * easyEase((p-0.92)/0.08);
}

/* ==========================================================================
   GLYPH RENDERING  — using native browser variable font interpolation
   ========================================================================== */
function setGlyphWeight(w) {
  // Continuous float; browser handles interpolation internally.
  glyphCanvas.style.fontVariationSettings = `"wght" ${w.toFixed(2)}`;
  // Also update font-weight so measureText() reflects the same face.
  // Browsers that don't honor fontVariationSettings on canvas will at
  // least still pick the nearest static weight this way.
  glyphCanvas.style.fontWeight = Math.round(w);
}

/* Render one letter into glyphCanvas (upright, centered).
   The canvas is resized per-letter to just enough room for the drawn glyph
   plus padding for the italic skew applied outside this function (we don't
   skew here — skew is applied on the main canvas via ctx.transform so we
   keep the offscreen buffer simple and stable). */
function renderLetter(letter, emPx) {
  const pad = Math.ceil(emPx * 0.35);
  const W = Math.ceil(emPx * 1.2) + pad*2;
  const H = Math.ceil(emPx * 1.3) + pad*2;
  if (glyphCanvas.width !== W)  glyphCanvas.width = W;
  if (glyphCanvas.height !== H) glyphCanvas.height = H;

  gctx.clearRect(0, 0, W, H);
  gctx.fillStyle = "#000";
  gctx.textAlign = "center";
  gctx.textBaseline = "middle";
  gctx.font = `${emPx}px "Nohemi", sans-serif`;
  gctx.fillText(letter, W/2, H/2);

  return { W, H };
}

/* Offscreen DOM element for measuring advances with actual variable font
   interpolation. Unlike ctx.measureText (which ignores
   font-variation-settings and falls back to the nearest static weight),
   getBoundingClientRect on a span with the right CSS returns the real
   advance at the continuous wght value. */
const measureSpan = document.createElement("span");
measureSpan.style.cssText = [
  "position:fixed",
  "left:-99999px", "top:-99999px",
  "visibility:hidden",
  "white-space:pre",
  "font-family:'Nohemi',sans-serif",
  "line-height:1",
].join(";");
document.body.appendChild(measureSpan);

function measureAdvanceDOM(letter, emPx, weight) {
  measureSpan.style.fontSize = emPx + "px";
  measureSpan.style.fontVariationSettings = `"wght" ${weight.toFixed(2)}`;
  measureSpan.style.fontWeight = Math.round(weight);
  measureSpan.textContent = letter;
  return measureSpan.getBoundingClientRect().width;
}

/* ==========================================================================
   CONTOUR TRACING  (Moore neighborhood)
   ========================================================================== */
function extractAlpha(W, H) {
  const img = gctx.getImageData(0, 0, W, H).data;
  const a = new Uint8Array(W*H);
  for (let i=0, j=3; i<a.length; i++, j+=4) a[i] = img[j] > 90 ? 1 : 0;
  return a;
}

function traceContours(alpha, W, H) {
  const visited = new Uint8Array(W*H);
  const contours = [];
  const NX = [ 1, 1, 0,-1,-1,-1, 0, 1];
  const NY = [ 0, 1, 1, 1, 0,-1,-1,-1];
  const at = (x,y) => (x>=0&&y>=0&&x<W&&y<H) ? alpha[y*W+x] : 0;
  const isB = (x,y) => at(x,y) && (!at(x-1,y)||!at(x+1,y)||!at(x,y-1)||!at(x,y+1));
  function walk(sx,sy){
    const c=[]; let x=sx,y=sy,prev=6,step=0; const MAX=W*H*2;
    do {
      c.push([x,y]); visited[y*W+x]=1;
      let f=false;
      for (let k=0;k<8;k++){
        const d=(prev+1+k)&7, nx=x+NX[d], ny=y+NY[d];
        if (at(nx,ny) && isB(nx,ny)) { prev=(d+4)&7; x=nx; y=ny; f=true; break; }
      }
      if (!f) break; step++; if (step>MAX) break;
    } while (!(x===sx&&y===sy) || c.length<3);
    return c;
  }
  for (let y=0;y<H;y++) for (let x=0;x<W;x++){
    if (isB(x,y) && !visited[y*W+x]){
      const c = walk(x,y);
      if (c.length>8) contours.push(c);
    }
  }
  return contours;
}

function turnAngleDeg(a,b,c){
  const ax=b[0]-a[0], ay=b[1]-a[1];
  const bx=c[0]-b[0], by=c[1]-b[1];
  const la=Math.hypot(ax,ay), lb=Math.hypot(bx,by);
  if (la<0.01||lb<0.01) return 0;
  return Math.acos(Math.max(-1,Math.min(1,(ax*bx+ay*by)/(la*lb))))*180/Math.PI;
}

function placeAnchors(contour, step) {
  const n = contour.length;
  if (n < 4) return contour.slice();

  // ---- Corner detection + non-max suppression (unchanged) ----
  const WIN = Math.max(2, Math.min(6, Math.floor(step*0.25)));
  const corners = new Set();
  for (let i=0;i<n;i++){
    if (turnAngleDeg(contour[(i-WIN+n)%n], contour[i], contour[(i+WIN)%n]) > CORNER_DEG) corners.add(i);
  }
  const kept = [];
  const nms = Math.max(2, Math.floor(step*0.35));
  const cornerArr = [...corners].sort((a,b)=>a-b);
  const usedInNMS = new Set();
  for (const i of cornerArr) {
    if (usedInNMS.has(i)) continue;
    let best = i, bestA = 0;
    for (let k=-nms;k<=nms;k++){
      const j = (i+k+n)%n;
      if (corners.has(j)) {
        const a = turnAngleDeg(contour[(j-WIN+n)%n], contour[j], contour[(j+WIN)%n]);
        if (a > bestA) { bestA = a; best = j; }
      }
    }
    // Mark the whole window as used so we only keep one representative.
    for (let k=-nms;k<=nms;k++) usedInNMS.add((best+k+n)%n);
    kept.push(best);
  }

  // ---- Cumulative arc-length per vertex ----
  const arc = new Array(n + 1);
  arc[0] = 0;
  for (let i=0;i<n;i++){
    const a = contour[i], b = contour[(i+1)%n];
    arc[i+1] = arc[i] + Math.hypot(b[0]-a[0], b[1]-a[1]);
  }
  const perim = arc[n];
  if (perim < 1e-3) return [contour[0]];

  // ---- Build anchor schedule ----
  // We always keep the corner anchors. Between two consecutive corners we
  // divide the arc by ROUND(arcLen / step) equal sub-arcs. This way each
  // anchor position is a CONTINUOUS function of the contour perimeter:
  // when the glyph weight changes slightly, anchors glide along the
  // contour instead of appearing/disappearing at discrete thresholds.
  // Spacing is allowed to be a bit shorter or longer than `step` so we
  // never need to drop or add an anchor mid-animation.
  const anchors = [];

  // Helper: get interpolated point at a given arc-length s in [0, perim).
  function pointAt(s) {
    // s is wrapped into [0, perim). Binary search over the cumulative
    // arc array is overkill for our sizes — linear scan is fine.
    s = ((s % perim) + perim) % perim;
    for (let i=0;i<n;i++){
      if (arc[i+1] >= s) {
        const segLen = arc[i+1] - arc[i];
        const t = segLen > 0 ? (s - arc[i]) / segLen : 0;
        const a = contour[i], b = contour[(i+1)%n];
        return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t];
      }
    }
    return contour[0];
  }

  if (kept.length === 0) {
    // No corners — uniform division of the whole perimeter
    const N = Math.max(6, Math.round(perim / step));
    const effStep = perim / N;
    for (let k=0;k<N;k++) anchors.push(pointAt(k * effStep));
    return anchors;
  }

  // Sort corners by arc length so we can walk them in order
  kept.sort((a,b) => arc[a] - arc[b]);
  // Emit each corner + fill between this corner and the next with an
  // integer number of equally-spaced anchors.
  for (let ci=0; ci<kept.length; ci++){
    const thisCorner = kept[ci];
    const nextCorner = kept[(ci+1) % kept.length];
    const s0 = arc[thisCorner];
    const s1 = arc[nextCorner];
    // Length from this corner to the next, wrapping around
    const segArc = (s1 - s0 + perim) % perim || perim;
    // Always emit the corner itself
    anchors.push(contour[thisCorner]);
    // Divide the inter-corner arc into ceil(segArc/step) equal pieces,
    // but at LEAST 1 (so we don't emit two corners right next to each
    // other with nothing in between when segArc < step).
    const N = Math.max(1, Math.round(segArc / step));
    const effStep = segArc / N;
    for (let k=1;k<N;k++){
      anchors.push(pointAt(s0 + k * effStep));
    }
  }

  return anchors;
}

/* ==========================================================================
   COLOR HELPERS  — tiny gradients instead of flat fills for subtle depth
   ========================================================================== */
function hexToRgb(h) {
  h = h.replace("#","");
  if (h.length === 3) h = h.split("").map(c => c+c).join("");
  const n = parseInt(h, 16);
  return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 };
}
function shiftColor(hex, delta) {
  // delta in [-1..1]. Positive brightens, negative darkens.
  const { r, g, b } = hexToRgb(hex);
  const f = x => {
    if (delta >= 0) return Math.round(x + (255 - x) * delta);
    return Math.round(x * (1 + delta));
  };
  return `rgb(${f(r)}, ${f(g)}, ${f(b)})`;
}
/* Build a gentle diagonal gradient (top-left brighter, bottom-right darker)
   for a given CSS var. Amount controls how pronounced the gradient is. */
function buildGradient(ctx2d, W, H, hex, amount = 0.12) {
  const grad = ctx2d.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0.0, shiftColor(hex,  amount));
  grad.addColorStop(0.5, hex);
  grad.addColorStop(1.0, shiftColor(hex, -amount));
  return grad;
}

/* ==========================================================================
   MAIN RENDER — renderScene() draws one frame at phase p onto any canvas.
   The live loop uses the on-screen canvas; the export loop uses an
   off-screen canvas of the target resolution.
   ========================================================================= */

// Compute the CSS background color the stage has at phase p.
// Mirrors the @keyframes bgCycle schedule with AE-eased transitions.
// Returns {r, g, b} so we can interpolate and tint the ascii layer too.
function bgColorRGB(p) {
  const sky  = hexToRgb(cssVar("--c-sky"));
  const ink  = hexToRgb(cssVar("--c-ink"));
  const lime = hexToRgb(cssVar("--c-lime"));
  const deep = hexToRgb(cssVar("--c-lime-deep"));
  const lerp = (A, B, t) => ({
    r: A.r + (B.r - A.r) * t,
    g: A.g + (B.g - A.g) * t,
    b: A.b + (B.b - A.b) * t,
  });
  if (p <= 0.18) return sky;
  if (p < 0.24)  return lerp(sky, ink,  easyEase((p-0.18)/0.06));
  if (p <= 0.42) return ink;
  if (p < 0.48)  return lerp(ink, lime, easyEase((p-0.42)/0.06));
  if (p <= 0.68) return lime;
  if (p < 0.74)  return lerp(lime, deep, easyEase((p-0.68)/0.06));
  if (p <= 0.92) return deep;
  return lerp(deep, sky, easyEase((p-0.92)/0.08));
}
function bgColorAt(p) {
  const c = bgColorRGB(p);
  return `rgb(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)})`;
}

// Accent colour — the colour the ASCII characters paint themselves in.
// We pick the NEXT colour in the palette cycle (so when bg is "sky", the
// ascii is "ink"; when bg is "ink", ascii is "lime"; etc.), which gives
// good contrast and feels thematically tied to the bg cycle. We interpolate
// the accent with the same eases so the two colours breathe together.
function accentColorRGB(p) {
  const sky  = hexToRgb(cssVar("--c-sky"));
  const ink  = hexToRgb(cssVar("--c-ink"));
  const lime = hexToRgb(cssVar("--c-lime"));
  const deep = hexToRgb(cssVar("--c-lime-deep"));
  const lerp = (A, B, t) => ({
    r: A.r + (B.r - A.r) * t,
    g: A.g + (B.g - A.g) * t,
    b: A.b + (B.b - A.b) * t,
  });
  // Schedule is the bg cycle but shifted forward by one stop.
  if (p <= 0.18) return ink;
  if (p < 0.24)  return lerp(ink, lime, easyEase((p-0.18)/0.06));
  if (p <= 0.42) return lime;
  if (p < 0.48)  return lerp(lime, deep, easyEase((p-0.42)/0.06));
  if (p <= 0.68) return deep;
  if (p < 0.74)  return lerp(deep, sky, easyEase((p-0.68)/0.06));
  if (p <= 0.92) return sky;
  return lerp(sky, ink, easyEase((p-0.92)/0.08));
}

/* ==========================================================================
   VALUE NOISE  — tiny, deterministic, enough to drive wave-like motion
   ========================================================================== */
// Hash integer grid points to a pseudo-random [0,1) value.
function hash2(ix, iy) {
  let n = ix * 374761393 + iy * 668265263;
  n = (n ^ (n >>> 13)) >>> 0;
  n = (n * 1274126177) >>> 0;
  n = (n ^ (n >>> 16)) >>> 0;
  return (n & 0xffffff) / 0x1000000;
}
function smootherstep(t) { return t*t*t*(t*(t*6 - 15) + 10); }
// Smooth 2D value noise — float coords, returns [0, 1].
function valueNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix,        fy = y - iy;
  const u = smootherstep(fx), v = smootherstep(fy);
  const a = hash2(ix,     iy);
  const b = hash2(ix + 1, iy);
  const c = hash2(ix,     iy + 1);
  const d = hash2(ix + 1, iy + 1);
  return (a + (b - a) * u) * (1 - v) + (c + (d - c) * u) * v;
}
// Fractal Brownian motion — layered noise for richer "wave" patterns.
function fbm(x, y) {
  let sum = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < 4; i++) {
    sum  += valueNoise(x * freq, y * freq) * amp;
    freq *= 2;
    amp  *= 0.5;
  }
  return sum; // ~[0, 0.9]
}

// ---- Loopable noise via a circular sweep through 4D ----
// To make the animation perfectly loop, we don't animate along a line in
// time. Instead, for each spatial position we evaluate the 2D noise at
// coordinates offset by a point (cz, cw) tracing a CIRCLE as phase p goes
// from 0 to 1. Since a full circle returns to its start, the noise at p=0
// and p=1 is identical. To approximate 4D noise with our 2D primitive we
// sample the 2D noise twice on orthogonal planes and average them — it's
// not true 4D but looks just as fluid for this kind of wavey visual.
function fbmLoop(x, y, p, seed) {
  const ang = p * Math.PI * 2;
  const r   = 1.4;                     // radius of the time circle
  const cz  = Math.cos(ang) * r;
  const cw  = Math.sin(ang) * r;
  // Two orthogonal 2D slices through the "4D" field
  const a = fbm(x + cz + seed,        y + cw + seed * 0.7);
  const b = fbm(x - cw + seed * 1.3,  y + cz + seed * 0.4);
  return (a + b) * 0.5;
}

/* ==========================================================================
   ASCII WAVE BACKGROUND
   --------------------------------------------------------------------------
   A monospace grid driven by a perfectly-looping domain-warped noise field.
   Cells whose noise value falls below `noiseIntensity` stay empty, so you
   get rolling waves with quiet zones instead of a solid carpet.
   Both the noise scroll and the colour palette are keyed to the same phase
   p, so the speed slider affects everything coherently.
   ========================================================================== */
const ASCII_RAMP = " .·:-+=*xX%#@";

// Pre-created intermediate canvas for the ascii layer (so we can blur it).
const _asciiCan = document.createElement("canvas");
const _asciiCtx = _asciiCan.getContext("2d");

/* Evaluate the noise field at a given screen-pixel position.
   Using SCREEN coordinates (not grid indices) guarantees that the topo
   lines and the ASCII characters read the SAME field, even though they
   sample it on grids of different resolutions.
   The `noiseScale` slider zooms in/out of the noise: a smaller scale
   compresses more waves into the view (dense pattern), a larger scale
   stretches the field so you see broad features (zoomed in). */
const NOISE_WAVELENGTH = 180;   // pixels per cycle, roughly — tune wavelength
function noiseAtPixel(px, py, p) {
  // Effective wavelength = base × noiseScale. Larger scale = longer waves
  // (zoomed in on a bigger feature). 1× is the default look.
  const wavelength = NOISE_WAVELENGTH * noiseScale;
  const nx = px / wavelength * 2.0;
  const ny = py / wavelength * 2.0;

  const warpAmp = 1.4;
  const wx = fbmLoop(nx * 0.5,        ny * 0.5,        p, 0.0);
  const wy = fbmLoop(nx * 0.5 + 19.1, ny * 0.5 + 11.7, p, 3.7);

  let n = fbmLoop(
    nx + (wx - 0.5) * 2 * warpAmp,
    ny + (wy - 0.5) * 2 * warpAmp,
    p, 7.3
  );
  return Math.max(0, Math.min(1, n * 1.15));
}

/* Sample the noise field on a uniform grid at a given cell size. Both
   topo contours and ASCII use this same function, just at different
   resolutions. */
function sampleNoiseField(W, H, cell, p) {
  const cols = Math.ceil(W / cell) + 2;
  const rows = Math.ceil(H / cell) + 2;
  const field = new Float32Array(cols * rows);

  for (let gy = 0; gy < rows; gy++) {
    for (let gx = 0; gx < cols; gx++) {
      // Screen-pixel position of this grid node
      const px = gx * cell;
      const py = gy * cell;
      field[gy * cols + gx] = noiseAtPixel(px, py, p);
    }
  }
  return { field, cols, rows, cell };
}

/* Marching-squares topographic contour overlay.
   For each iso-value in LEVELS, we walk the grid; each cell's 4 corners
   are compared to the threshold to produce a 4-bit case index, and we
   draw the corresponding segment(s) with linear interpolation along
   the crossed edges. This produces smooth iso-lines ("contour map"). */
function drawTopoLines(ctx, sample, W, H, p) {
  if (topoStrength < 0.01) return;

  const { field, cols, rows, cell } = sample;
  const acc = accentColorRGB(p);

  // 8 contour levels evenly spaced. Tweakable: more levels → denser map.
  const LEVELS = [0.12, 0.24, 0.36, 0.48, 0.58, 0.68, 0.78, 0.88];

  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineWidth = Math.max(0.6, cell * 0.05);
  ctx.strokeStyle = `rgba(${Math.round(acc.r)},${Math.round(acc.g)},${Math.round(acc.b)},${(topoStrength * 0.85).toFixed(3)})`;

  // Helper to interpolate edge crossing position (linear between two corners)
  // given their field values and the threshold.
  const lerpX = (v1, v2, thr) => {
    const t = (thr - v1) / (v2 - v1 || 1e-9);
    return Math.max(0, Math.min(1, t));
  };

  ctx.beginPath();
  for (const thr of LEVELS) {
    for (let gy = 0; gy < rows - 1; gy++) {
      for (let gx = 0; gx < cols - 1; gx++) {
        // Corner values (TL, TR, BR, BL)
        const v00 = field[gy * cols + gx];
        const v10 = field[gy * cols + gx + 1];
        const v11 = field[(gy + 1) * cols + gx + 1];
        const v01 = field[(gy + 1) * cols + gx];

        // 4-bit case
        const c = ((v00 > thr) ? 1 : 0)
                | ((v10 > thr) ? 2 : 0)
                | ((v11 > thr) ? 4 : 0)
                | ((v01 > thr) ? 8 : 0);

        if (c === 0 || c === 15) continue;     // all in or all out — no edge

        // Corners-above-threshold bitmask — expand to booleans for clarity.
        const b00 = (c & 1)  !== 0;
        const b10 = (c & 2)  !== 0;
        const b11 = (c & 4)  !== 0;
        const b01 = (c & 8)  !== 0;

        const x0 = gx * cell, y0 = gy * cell;
        const x1 = x0 + cell, y1 = y0 + cell;

        // Compute only the edge crossings that actually exist.
        let tx, ty, rx, ry, bx, by, lx, ly;
        if (b00 !== b10) { tx = x0 + lerpX(v00, v10, thr) * cell; ty = y0; }          // top
        if (b10 !== b11) { rx = x1; ry = y0 + lerpX(v10, v11, thr) * cell; }          // right
        if (b01 !== b11) { bx = x0 + lerpX(v01, v11, thr) * cell; by = y1; }          // bottom
        if (b00 !== b01) { lx = x0; ly = y0 + lerpX(v00, v01, thr) * cell; }          // left

        // Connect the intersection points based on the case.
        // Standard marching-squares topology (0-15):
        // cases 1/14 → top-left corner cut, line from top edge to left edge
        // cases 2/13 → top-right corner, line from top to right
        // cases 4/11 → bottom-right, line from right to bottom
        // cases 8/7  → bottom-left, line from bottom to left
        // cases 3/12 → horizontal band, line from left to right
        // cases 6/9  → vertical band, line from top to bottom
        // cases 5/10 → saddle, two disjoint lines
        switch (c) {
          case 1: case 14:
            ctx.moveTo(tx, ty); ctx.lineTo(lx, ly); break;
          case 2: case 13:
            ctx.moveTo(tx, ty); ctx.lineTo(rx, ry); break;
          case 4: case 11:
            ctx.moveTo(rx, ry); ctx.lineTo(bx, by); break;
          case 8: case 7:
            ctx.moveTo(bx, by); ctx.lineTo(lx, ly); break;
          case 3: case 12:
            ctx.moveTo(lx, ly); ctx.lineTo(rx, ry); break;
          case 6: case 9:
            ctx.moveTo(tx, ty); ctx.lineTo(bx, by); break;
          case 5:
            // Saddle: pick the "corner" interpretation.
            ctx.moveTo(tx, ty); ctx.lineTo(rx, ry);
            ctx.moveTo(bx, by); ctx.lineTo(lx, ly); break;
          case 10:
            ctx.moveTo(tx, ty); ctx.lineTo(lx, ly);
            ctx.moveTo(rx, ry); ctx.lineTo(bx, by); break;
        }
      }
    }
  }
  ctx.stroke();
  ctx.restore();
}

function drawAsciiWave(ctx, W, H, p, paintedBg) {
  // Sync the intermediate canvas to the target size
  if (_asciiCan.width !== W || _asciiCan.height !== H) {
    _asciiCan.width = W; _asciiCan.height = H;
  }
  const a = _asciiCtx;
  a.clearRect(0, 0, W, H);

  // Base cell ~16-22px then scaled by the user-controlled asciiSize slider.
  const baseCell = Math.max(12, Math.min(22, Math.round(Math.min(W, H) / 54)));
  const cell = Math.max(6, Math.round(baseCell * asciiSize));
  const cols = Math.ceil(W / cell) + 1;
  const rows = Math.ceil(H / cell) + 1;

  const fontPx = Math.round(cell * 1.02);
  a.font = `500 ${fontPx}px "Nohemi", ui-monospace, monospace`;
  a.textAlign = "center";
  a.textBaseline = "middle";

  const acc = accentColorRGB(p);
  const baseAlpha = paintedBg ? 0.65 : 0.85;

  // ---- First, sample the noise field on a FINE grid for topo lines ----
  // The ASCII cell is typically 12-22px; we want topo to be smoother,
  // so we sample at ~half that size. This costs ~4× the noise calls but
  // gives much nicer curves.
  const topoCell = Math.max(4, Math.round(cell * 0.45));
  const topoSample = sampleNoiseField(W, H, topoCell, p);

  // Draw topo FIRST so ascii characters sit on top of the lines.
  drawTopoLines(a, topoSample, W, H, p);

  // ---- Now the ASCII layer — samples the SAME noise field as the topo,
  //      just at a coarser resolution. Because both use noiseAtPixel()
  //      with pixel coordinates, the values line up perfectly: a peak in
  //      the topo lines corresponds to a dense-ascii zone, and vice versa.
  const intensity = noiseIntensity;
  const threshold = 1 - intensity * 0.85;

  for (let cy = 0; cy < rows; cy++) {
    for (let cx = 0; cx < cols; cx++) {
      const px = cx * cell + cell * 0.5;
      const py = cy * cell + cell * 0.5;
      const n = noiseAtPixel(px, py, p);

      if (n < threshold) continue;
      const v = (n - threshold) / (1 - threshold);

      const idx = Math.min(ASCII_RAMP.length - 1,
                           Math.max(1, Math.floor(v * ASCII_RAMP.length)));
      const ch = ASCII_RAMP[idx];

      const edge = Math.min(1, (n - threshold) / 0.12);
      const alpha = baseAlpha * (0.35 + 0.65 * v) * edge;
      a.fillStyle = `rgba(${Math.round(acc.r)},${Math.round(acc.g)},${Math.round(acc.b)},${alpha.toFixed(3)})`;
      a.fillText(ch, px, py);
    }
  }

  // Composite back to the main canvas, with optional blur.
  if (noiseBlur > 0.01) {
    ctx.save();
    ctx.filter = `blur(${noiseBlur.toFixed(1)}px)`;
    ctx.drawImage(_asciiCan, 0, 0);
    ctx.restore();
  } else {
    ctx.drawImage(_asciiCan, 0, 0);
  }
}

function renderScene(destCanvas, destCtx, p, paintBg) {
  const ctx = destCtx;
  const canvas = destCanvas;
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;

  // If we're exporting we need to paint the background ourselves (CSS
  // stage background doesn't show up in a captureStream/toBlob).
  if (paintBg) {
    ctx.fillStyle = bgColorAt(p);
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.clearRect(0, 0, W, H);
  }

  // ASCII wave layer — draw BEFORE the word so the word sits on top.
  // When transparent (not painting bg), we still draw the ascii — the user
  // gets a transparent export with just the wave + word, which is neat.
  drawAsciiWave(ctx, W, H, p, paintBg);

  // ---- Multi-line layout with word-wrap and adaptive font size ----
  //
  // The live text can now span multiple lines. We pick the largest emPx
  // such that after wrapping, the whole block fits within the scene's
  // safe area (86% × 86%). Each character keeps its own phase-offset
  // weight, so the breathing wave still flows through all of them
  // sequentially — as if they were a single long word.
  //
  // Wrapping rule: greedy word-wrap at spaces. If a single "word"
  // (run of non-spaces) is longer than the line, we hard-break inside it.
  const safeW = W * 0.86;
  const safeH = H * 0.86;
  const lineHeightRatio = 1.05;                   // snug but readable
  // Probe at the HEAVIEST weight the letters will actually reach this loop
  // (depends on the amplitude slider). Using the heaviest weight guarantees
  // the layout never overflows horizontally, since no frame will be wider.
  const probeWeight = Math.min(900, Math.round(400 + 500 * weightAmp));
  const N = WORD.length;

  // Helper: measure the advance of a character at a given emPx at the
  // worst-case (widest) weight. Layout uses this stable measure so the
  // wrap decisions don't wobble frame-to-frame.
  const probeAdvance = (ch, emPx) => measureAdvanceDOM(ch, emPx, probeWeight);

  // Helper: wrap the WORD into lines at a given emPx. Returns {lines, okH}.
  // lines: [[ {idx, ch, advance}, ... ], ...]
  function wrapAt(emPx) {
    const tracking = -emPx * 0.03;
    const lines = [];
    let cur = [];
    let curW = 0;

    // Precompute per-char advance at probe weight.
    // Newlines count as spaces for measurement (they're not drawn).
    const adv = new Array(N);
    for (let i=0;i<N;i++) {
      if (WORD[i] === "\n") adv[i] = probeAdvance(" ", emPx);
      else adv[i] = probeAdvance(WORD[i], emPx);
    }

    // A "word boundary" is a DOUBLE space (or more) or an explicit newline.
    // Single spaces stay glued to surrounding letters and never cause wrap.
    const isBoundary = (k) => {
      if (k >= N) return false;
      if (WORD[k] === "\n") return true;
      if (WORD[k] === " " && k+1 < N && WORD[k+1] === " ") return true;
      return false;
    };

    // Walk char by char, building "words" (runs up to the next boundary)
    // and placing them. Wrap only at boundaries — never break inside a word.
    let i = 0;
    while (i < N) {
      // Collect indices for one "word" (everything up to the next boundary)
      const wordStart = i;
      while (i < N && !isBoundary(i)) i++;
      const wordEnd = i;                 // exclusive
      // Compute word width
      let ww = 0;
      for (let k=wordStart;k<wordEnd;k++) ww += adv[k] + (k>wordStart ? tracking : 0);

      // Can the word fit on the current line? (account for leading tracking)
      const extra = cur.length > 0 ? tracking : 0;
      if (curW + extra + ww <= safeW || cur.length === 0) {
        // Place all word chars on current line
        for (let k=wordStart;k<wordEnd;k++) {
          const t = cur.length > 0 ? tracking : 0;
          cur.push({ idx: k, ch: WORD[k], advance: adv[k] });
          curW += adv[k] + t;
        }
      } else {
        // Word doesn't fit: start a new line, then place the whole word
        // on it (even if it overflows — we never break inside a word).
        lines.push(cur); cur = []; curW = 0;
        for (let k=wordStart;k<wordEnd;k++) {
          const t = cur.length > 0 ? tracking : 0;
          cur.push({ idx: k, ch: WORD[k], advance: adv[k] });
          curW += adv[k] + t;
        }
      }

      // Handle the whitespace boundary separating this word from the next.
      if (i < N) {
        if (WORD[i] === "\n") {
          // Explicit newline — forces a new line, even for blank lines.
          lines.push(cur); cur = []; curW = 0;
          i++;
        } else if (WORD[i] === " ") {
          // Consecutive spaces (the boundary). Consume ALL of them.
          // On a new line they act as a visual break (not drawn).
          // On a line with content, they're the natural word break —
          // we push them to the next line entirely.
          lines.push(cur); cur = []; curW = 0;
          while (i < N && WORD[i] === " ") i++;
        }
      }
    }
    if (cur.length > 0) lines.push(cur);

    // Compute the widest line (may exceed safeW if a single word is
    // wider than the line — we need to shrink emPx in that case).
    let maxLineW = 0;
    for (const line of lines) {
      let lw = 0;
      for (let k=0;k<line.length;k++) {
        lw += line[k].advance + (k>0 ? tracking : 0);
      }
      if (lw > maxLineW) maxLineW = lw;
    }

    const totalH = lines.length * emPx * lineHeightRatio;
    return {
      lines, tracking,
      totalH, maxLineW,
      okH: totalH <= safeH,
      okW: maxLineW <= safeW,
    };
  }

  // Pick emPx: start at a reasonable "big" size, shrink if it overflows
  // vertically after wrapping. One iteration usually suffices.
  let emPx = Math.min(W, H) * 0.42;
  // For long strings, start smaller to save compute
  if (N > 60)      emPx *= 0.5;
  else if (N > 20) emPx *= 0.75;

  let wrap = wrapAt(emPx);
  // Shrink until the wrapped block fits BOTH vertically and horizontally.
  // Horizontal overflow happens when a single unbreakable word is wider than
  // the safe area — we need to reduce emPx enough to make that word fit.
  for (let iter=0; iter<10 && (!wrap.okH || !wrap.okW); iter++) {
    let scale = 1;
    if (!wrap.okW) scale = Math.min(scale, safeW / wrap.maxLineW);
    if (!wrap.okH) scale = Math.min(scale, Math.sqrt(safeH / wrap.totalH));
    emPx *= scale * 0.98;
    wrap = wrapAt(emPx);
  }
  const { lines, tracking } = wrap;

  // Each letter gets its own weight (phase-offset breathe) based on its
  // position in the GLOBAL sequence, so the wave flows continuously
  // through every line.
  const weights = new Array(N);
  for (let i=0;i<N;i++) weights[i] = currentWeight(p, i, N);

  // ---- Compute each line's starting X (centered) and Y (stacked) ----
  const lineH = emPx * lineHeightRatio;
  const blockH = lines.length * lineH;
  const firstY = cy - blockH / 2 + lineH * 0.5 + emPx * 0.08;

  // Measure each line width at the CURRENT weights for accurate centering.
  // (probe-weight advances can differ slightly from actual render advances,
  // but the wrapping decision already used probe, so we keep that.)
  // Build the flat layout array + re-bake per letter with real weights.
  const layout = new Array(N);
  const baked  = new Array(N);

  for (let li=0; li<lines.length; li++) {
    const line = lines[li];
    // Line width using real weights this frame
    let lineW = 0;
    for (let k=0;k<line.length;k++) {
      const c = line[k];
      const aw = measureAdvanceDOM(c.ch, emPx, weights[c.idx]);
      c.realAdvance = aw;
      lineW += aw + (k>0 ? tracking : 0);
    }
    let penX = cx - lineW/2;
    const posY = firstY + li * lineH;

    for (let k=0;k<line.length;k++) {
      const c = line[k];
      const i = c.idx;
      const advance = c.realAdvance;
      if (c.ch === " ") {
        layout[i] = null; baked[i] = null;
        penX += advance + tracking;
        continue;
      }
      const f = italicFactor(k, line.length, p, li, lines.length);
      const skew = -f * MAX_SKEW_RAD;
      layout[i] = {
        letter: c.ch,
        posX: penX + advance/2,
        posY: posY,
        skew,
        advance,
      };
      setGlyphWeight(weights[i]);
      const dim = renderLetter(c.ch, emPx);
      const imgData = gctx.getImageData(0, 0, dim.W, dim.H);
      const snap = document.createElement("canvas");
      snap.width = dim.W; snap.height = dim.H;
      snap.getContext("2d").putImageData(imgData, 0, 0);
      baked[i] = { W: dim.W, H: dim.H, snap, imgData };
      penX += advance + tracking;
    }
  }

  /* --- Layer A: blob masked by letter union --- */
  const bA = blobOpacity(p);
  if (bA > 0.01) {
    const maskCan = document.createElement("canvas");
    maskCan.width = W; maskCan.height = H;
    const mctx = maskCan.getContext("2d");
    for (let i=0;i<layout.length;i++){
      const L = layout[i], B = baked[i];
      if (!L || !B) continue;
      mctx.save();
      mctx.translate(L.posX, L.posY);
      mctx.transform(1, 0, Math.tan(L.skew), 1, 0, 0);
      mctx.drawImage(B.snap, -B.W/2, -B.H/2);
      mctx.restore();
    }

    const blobCan = document.createElement("canvas");
    blobCan.width = W; blobCan.height = H;
    const bctx = blobCan.getContext("2d");
    bctx.filter = "blur(10px)";
    bctx.fillStyle = cssVar("--c-lime");
    bctx.fillRect(0, 0, W, H);
    bctx.fillStyle = cssVar("--offwhite");
    bctx.globalAlpha = 0.85;
    const hr = emPx * 0.35;
    bctx.beginPath();
    bctx.ellipse(
      cx + Math.cos(p*Math.PI*2)*emPx*0.25,
      cy + Math.sin(p*Math.PI*2)*emPx*0.12,
      hr, hr*0.7, 0, 0, Math.PI*2);
    bctx.fill();
    bctx.globalAlpha = 1; bctx.filter = "none";
    bctx.globalCompositeOperation = "destination-in";
    bctx.drawImage(maskCan, 0, 0);

    ctx.globalAlpha = bA;
    ctx.drawImage(blobCan, 0, 0);
    ctx.globalAlpha = 1;
  }

  /* --- Layer B: solid text fill (tinted) --- */
  // Keep a reference to the tintCan so Layer D can blur JUST the letters
  // rather than the whole canvas (which would also blur the background).
  let lettersCan = null;
  const fA = fillOpacity(p);
  if (fA > 0.01) {
    const tintCan = document.createElement("canvas");
    tintCan.width = W; tintCan.height = H;
    const tctx = tintCan.getContext("2d");
    for (let i=0;i<layout.length;i++){
      const L = layout[i], B = baked[i];
      if (!L || !B) continue;
      tctx.save();
      tctx.translate(L.posX, L.posY);
      tctx.transform(1, 0, Math.tan(L.skew), 1, 0, 0);
      tctx.drawImage(B.snap, -B.W/2, -B.H/2);
      tctx.restore();
    }
    tctx.globalCompositeOperation = "source-in";
    tctx.fillStyle = buildGradient(tctx, W, H, cssVar("--c-ink"), 0.18);
    tctx.fillRect(0, 0, W, H);

    ctx.globalAlpha = fA;
    ctx.drawImage(tintCan, 0, 0);
    ctx.globalAlpha = 1;
    lettersCan = tintCan;       // remember for Layer D
    lettersCan._fillOpacity = fA;
  }

  /* --- Layer C: anchor squares — drawn into a side canvas so we can tint
         both fill and stroke with subtle diagonal gradients. --- */
  const dotR = emPx * DOT_R_REL;
  const dotSpace = emPx * DOT_SPACE_REL;
  const dotSide = dotR * 2;
  const dotCan = document.createElement("canvas");
  dotCan.width = W; dotCan.height = H;
  const dctx = dotCan.getContext("2d");

  // Step 1 : draw just the STROKE shapes in black, then tint with the
  // stroke gradient via "source-in".
  const strokeCan = document.createElement("canvas");
  strokeCan.width = W; strokeCan.height = H;
  const stctx = strokeCan.getContext("2d");
  stctx.fillStyle = "#000";
  stctx.strokeStyle = "#000";
  stctx.lineWidth = Math.max(0.75, dotR * 0.3);

  // Step 2 : draw the FILL squares in black, tint with fill gradient.
  const fillCan = document.createElement("canvas");
  fillCan.width = W; fillCan.height = H;
  const fctx = fillCan.getContext("2d");
  fctx.fillStyle = "#000";

  for (let i=0;i<layout.length;i++){
    const L = layout[i], B = baked[i];
    if (!L || !B) continue;
    const alpha = new Uint8Array(B.W*B.H);
    const img = B.imgData.data;
    for (let k=0, j=3; k<alpha.length; k++, j+=4) alpha[k] = img[j] > 90 ? 1 : 0;
    const contours = traceContours(alpha, B.W, B.H);
    const sk = Math.tan(L.skew);
    for (const c of contours) {
      const anchors = placeAnchors(c, dotSpace);
      for (const [x, y] of anchors) {
        const lx = x - B.W/2, ly = y - B.H/2;
        const gx = L.posX + lx + sk * ly;
        const gy = L.posY + ly;
        fctx.fillRect(gx - dotR, gy - dotR, dotSide, dotSide);
        stctx.strokeRect(gx - dotR, gy - dotR, dotSide, dotSide);
      }
    }
  }
  // Tint fill
  fctx.globalCompositeOperation = "source-in";
  fctx.fillStyle = buildGradient(fctx, W, H, cssVar("--c-dot-fill"), 0.14);
  fctx.fillRect(0, 0, W, H);
  // Tint stroke
  stctx.globalCompositeOperation = "source-in";
  stctx.fillStyle = buildGradient(stctx, W, H, cssVar("--c-dot-stroke"), 0.18);
  stctx.fillRect(0, 0, W, H);

  // Composite: fill first, stroke on top
  ctx.drawImage(fillCan, 0, 0);
  ctx.drawImage(strokeCan, 0, 0);

  /* --- Layer D: circular soft blur — ONE PER LINE, phase-offset ---
     Each line gets its own sweeping disk. The blur is applied ONLY to
     the letters (+ their anchor dots), so the background / topo / ascii
     stay sharp underneath. */
  {
    const HOLD = 0.15;          // held at extremes
    const STAGGER = 0.12;       // phase offset between consecutive lines
    const margin = emPx * 0.6;
    const blurR = emPx * 1.1;

    // Compose a single canvas containing ONLY the word artwork:
    //   letter fills (tinted) + anchor fill + anchor stroke.
    // Nothing from the background, topo or ascii layers is included, so
    // when we blur this snapshot we don't smudge those behind.
    const wordCan = document.createElement("canvas");
    wordCan.width = W; wordCan.height = H;
    const wctx = wordCan.getContext("2d");
    if (lettersCan) {
      wctx.globalAlpha = lettersCan._fillOpacity || 1;
      wctx.drawImage(lettersCan, 0, 0);
      wctx.globalAlpha = 1;
    }
    wctx.drawImage(fillCan,   0, 0);
    wctx.drawImage(strokeCan, 0, 0);

    // Blurred version of just-the-word
    const snap = document.createElement("canvas");
    snap.width = W; snap.height = H;
    const sctx = snap.getContext("2d");
    sctx.filter = "blur(48px)";
    sctx.drawImage(wordCan, 0, 0);
    sctx.filter = "none";

    // Build the composite mask: union of N radial gradients.
    const mask = document.createElement("canvas");
    mask.width = W; mask.height = H;
    const mctx2 = mask.getContext("2d");
    mctx2.globalCompositeOperation = "lighter";

    for (let li=0; li<lines.length; li++) {
      let lineP = (p - li * STAGGER) % 1;
      if (lineP < 0) lineP += 1;

      const halfP = (lineP * 2) % 1;
      let eased;
      if (halfP < HOLD)             eased = 0;
      else if (halfP > 1 - HOLD)    eased = 1;
      else                          eased = sharpEase((halfP - HOLD) / (1 - 2*HOLD));

      const sweep = lineP < 0.5 ? eased : 1 - eased;
      const blurX = margin + sweep * (W - margin * 2);
      const blurY = firstY + li * lineH;

      const grad = mctx2.createRadialGradient(blurX, blurY, 0, blurX, blurY, blurR);
      grad.addColorStop(0.00, "rgba(255,255,255,1)");
      grad.addColorStop(0.55, "rgba(255,255,255,0.85)");
      grad.addColorStop(1.00, "rgba(255,255,255,0)");
      mctx2.fillStyle = grad;
      mctx2.fillRect(0, 0, W, H);
    }
    mctx2.globalCompositeOperation = "source-over";

    // Mask the blurred-word snapshot to the disks…
    sctx.globalCompositeOperation = "destination-in";
    sctx.drawImage(mask, 0, 0);

    // Before compositing the blur, we need to ERASE the sharp word pixels
    // underneath in the disk regions, so we see the blur in place of
    // (rather than on top of) the sharp word. We do this by masking the
    // SHARP wordCan with the inverse of the disk mask, then subtracting.
    // Simpler approach: composite-destination-out first, then overlay blur.
    ctx.save();
    // Carve out the sharp word in the disk area so the blur replaces it.
    const eraseCan = document.createElement("canvas");
    eraseCan.width = W; eraseCan.height = H;
    const ectx = eraseCan.getContext("2d");
    ectx.drawImage(wordCan, 0, 0);
    ectx.globalCompositeOperation = "destination-in";
    ectx.drawImage(mask, 0, 0);
    // Subtract that from the main canvas (removes the sharp word inside disk)
    ctx.globalCompositeOperation = "destination-out";
    ctx.drawImage(eraseCan, 0, 0);
    // Now paint the blurred word on top
    ctx.globalCompositeOperation = "source-over";
    ctx.drawImage(snap, 0, 0);
    ctx.restore();
  }
}

/* ==========================================================================
   LIVE LOOP — accumulates phase from rAF deltas weighted by speed multiplier
   ========================================================================= */
let speed = 1;
let weightAmp = 1;
let noiseIntensity = 0.55;   // 0..1 — higher = more cells filled
let noiseBlur = 0;           // pixels, blur applied to the ascii layer
let asciiSize = 1;           // 0.5 .. 2 — multiplier on default cell size
let topoStrength = 0.5;      // 0..1 — opacity of the topographic contour overlay
let noiseScale = 1;          // 0.3 .. 9 — zoom factor of the noise field
let phase = 0;
let lastFrameTime = performance.now();

function liveTick(now) {
  const dt = now - lastFrameTime;
  lastFrameTime = now;
  phase = (phase + (dt / LOOP_MS) * speed) % 1;
  renderScene(canvas, ctx, phase, true);
  requestAnimationFrame(liveTick);
}

/* UI wiring */
input.addEventListener("input", (e) => {
  // Normalise CRLF → LF, strip tabs, keep newlines as real line breaks.
  let val = e.target.value.replace(/\r\n?/g, "\n").replace(/\t/g, " ");
  if (val.length > MAX_LETTERS) val = val.slice(0, MAX_LETTERS);
  if (val.length === 0) val = "a";
  WORD = val;
  // Auto-grow the textarea up to its max-height
  e.target.style.height = "auto";
  e.target.style.height = Math.min(220, e.target.scrollHeight) + "px";
});
// Size the textarea to its initial value on load
requestAnimationFrame(() => {
  input.style.height = "auto";
  input.style.height = Math.min(220, input.scrollHeight) + "px";
});
document.querySelectorAll('.swatch input[type="color"]').forEach(inp => {
  inp.addEventListener("input", (e) => {
    document.documentElement.style.setProperty(e.target.dataset.var, e.target.value);
    e.target.parentElement.style.background = e.target.value;
  });
});

/* ==========================================================================
   OFFLINE VIDEO EXPORT — WebCodecs + muxers
   --------------------------------------------------------------------------
   Unlike MediaRecorder which records in wall-clock time (and therefore
   captures any lag that occurs during live rendering), this path encodes
   each frame individually and assigns an ARTIFICIAL timestamp based on
   its index. The animation timing of the output video is perfect
   regardless of how long rendering each frame takes.

   Flow:
     1. Create an offscreen canvas at the target resolution.
     2. For each frame i in [0, TOTAL_FRAMES):
          - Render frame i at phase p = i / TOTAL_FRAMES onto the canvas.
          - Wrap the canvas into a VideoFrame with timestamp = i * (1e6/FPS).
          - Enqueue the VideoFrame into a VideoEncoder.
     3. The encoder emits EncodedVideoChunks which go into a muxer
        (Mp4Muxer for opaque, WebMMuxer for alpha/transparent).
     4. Finalize the muxer, wrap bytes in a Blob, trigger download.
   ========================================================================== */
const exportPortrait  = document.getElementById("exportPortrait");
const exportLandscape = document.getElementById("exportLandscape");
const exportProgress  = document.getElementById("exportProgress");
const transparentBg   = document.getElementById("transparentBg");

function webCodecsAvailable() {
  return typeof VideoEncoder !== "undefined" &&
         typeof VideoFrame   !== "undefined";
}

async function exportVideo(width, height) {
  if (!webCodecsAvailable()) {
    alert("Your browser doesn't support WebCodecs. Use a recent version of Chrome, Edge or Safari 16.4+.");
    return;
  }

  const transparent = transparentBg.checked;

  // Verify muxer presence (loaded via CDN). If the CDN failed to load, warn.
  const Mp4Muxer  = window.Mp4Muxer;
  const WebMMuxer = window.WebMMuxer;
  if (transparent && (!WebMMuxer || !WebMMuxer.Muxer)) {
    alert("WebM muxer couldn't load. Check your internet connection and reload.");
    return;
  }
  if (!transparent && (!Mp4Muxer || !Mp4Muxer.Muxer)) {
    alert("MP4 muxer couldn't load. Check your internet connection and reload.");
    return;
  }

  exportPortrait.disabled  = true;
  exportLandscape.disabled = true;
  exportProgress.textContent = "0%";

  const FPS = 30;
  const DURATION_S = LOOP_MS / 1000;
  const TOTAL_FRAMES = Math.round(FPS * DURATION_S);
  const FRAME_US = 1_000_000 / FPS;          // microseconds per frame

  // ---- Offscreen canvas at target resolution ----
  const expCanvas = document.createElement("canvas");
  expCanvas.width = width; expCanvas.height = height;
  const expCtx = expCanvas.getContext("2d", { alpha: transparent });

  // ---- Set up encoder + muxer ----
  let muxer, encoder, ext;

  try {
    if (transparent) {
      // WebM + VP9 with alpha channel
      muxer = new WebMMuxer.Muxer({
        target: new WebMMuxer.ArrayBufferTarget(),
        video: {
          codec: "V_VP9",
          width, height,
          frameRate: FPS,
          alpha: true,
        },
        // Use in-memory target; finalize at end.
      });
      encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: (e) => { console.error("Encoder error:", e); throw e; },
      });
      encoder.configure({
        codec: "vp09.00.10.08",     // VP9 profile 0 / level 1.0 / 8-bit
        width, height,
        bitrate: 10_000_000,
        framerate: FPS,
        alpha: "keep",              // preserve alpha channel
      });
      ext = "webm";
    } else {
      // MP4 + H.264 (AVC)
      muxer = new Mp4Muxer.Muxer({
        target: new Mp4Muxer.ArrayBufferTarget(),
        video: {
          codec: "avc",
          width, height,
          frameRate: FPS,
        },
        fastStart: "in-memory",
        firstTimestampBehavior: "offset",
      });
      encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: (e) => { console.error("Encoder error:", e); throw e; },
      });
      encoder.configure({
        codec: "avc1.640028",       // H.264 High profile level 4.0
        width, height,
        bitrate: 12_000_000,
        framerate: FPS,
        avc: { format: "avc" },
      });
      ext = "mp4";
    }
  } catch (err) {
    alert("Failed to initialize encoder: " + err.message);
    exportPortrait.disabled = exportLandscape.disabled = false;
    exportProgress.textContent = "";
    return;
  }

  // ---- Render + encode loop (offline, as fast as CPU allows) ----
  try {
    for (let i = 0; i < TOTAL_FRAMES; i++) {
      const p = i / TOTAL_FRAMES;
      renderScene(expCanvas, expCtx, p, !transparent);

      const frame = new VideoFrame(expCanvas, {
        timestamp: Math.round(i * FRAME_US),
        duration:  Math.round(FRAME_US),
      });

      // Force a keyframe every second for scrub-ability; first frame always key.
      const isKeyFrame = (i % FPS === 0) || i === 0;
      encoder.encode(frame, { keyFrame: isKeyFrame });
      frame.close();

      // Update progress; yield to the browser so the UI doesn't freeze.
      // The encoder can queue up — we just don't want to build a huge backlog.
      if (i % 3 === 0) {
        exportProgress.textContent = Math.round((i + 1) / TOTAL_FRAMES * 100) + "%";
        // Yield so pending encoder work can drain + UI can paint.
        await new Promise(r => setTimeout(r, 0));
        // If backlog is too big, wait for it to drain a bit.
        while (encoder.encodeQueueSize > 10) {
          await new Promise(r => setTimeout(r, 4));
        }
      }
    }

    exportProgress.textContent = "encoding…";
    await encoder.flush();
    muxer.finalize();
  } catch (err) {
    alert("Encoding failed: " + err.message);
    exportPortrait.disabled = exportLandscape.disabled = false;
    exportProgress.textContent = "";
    return;
  }

  // ---- Extract file bytes and trigger download ----
  const { buffer } = muxer.target;
  const blob = new Blob([buffer], { type: transparent ? "video/webm" : "video/mp4" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `${WORD.replace(/[^a-z0-9]/gi,'_') || 'anim'}-${width}x${height}.${ext}`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);

  exportProgress.textContent = "done";
  setTimeout(() => { exportProgress.textContent = ""; }, 2500);
  exportPortrait.disabled  = false;
  exportLandscape.disabled = false;
}

exportPortrait .addEventListener("click", () => exportVideo(1080, 1920));
exportLandscape.addEventListener("click", () => exportVideo(1920, 1080));

document.fonts.ready.then(() => requestAnimationFrame(liveTick));
</script>
